services:
  - type: web
    name: whatsapp-marketing
    env: node
    plan: free
    healthCheckPath: /api/health
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install --include=dev
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: https://whatsapp-marketing-c1qj.onrender.com
      - key: CLEANUP_ENABLED
        value: "false"
      - key: DATA_RETENTION_ENABLED
        value: "true"
      - key: CHAT_RETENTION_DAYS
        value: "90"
      - key: MESSAGE_RETENTION_DAYS
        value: "180"
      - key: AI_CHAT_RETENTION_DAYS
        value: "30"
      - key: AUDIT_LOG_RETENTION_DAYS
        value: "180"
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SMS_BATCH_SIZE
        value: "5"
      - key: SMS_BATCH_DELAY_MS
        value: "6000"
