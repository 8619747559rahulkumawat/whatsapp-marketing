services:
  - type: web
    name: whatsapp-marketing
    env: node
    plan: free
    healthCheckPath: /api/health
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install --include=dev
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: https://whatsapp-marketing-c1qj.onrender.com
      - key: CLEANUP_ENABLED
        value: "false"
